<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Dive Kit — Open Data & Standards</title>

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/assets/divekit/favicon.png" />
    <link rel="apple-touch-icon" href="/assets/divekit/logo-circle-light.png" />

    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Project Dive Kit — Open Data & Standards" />
    <meta property="og:description" content="Open data, schemas, and public standards for the diving community" />
    <meta property="og:image" content="https://open.divekit.app/assets/divekit/logo-circle-light.png" />
    <meta property="og:type" content="website" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.0/github-markdown.min.css"
      integrity="sha384-LTbdgUzZ3SXn50n5dAZ75Kpp86fR5oSHELRlFJqZ08kHpI2/Jwsgi/KA8UdnqXSK"
      crossorigin="anonymous" />
    <script
      src="https://cdn.jsdelivr.net/npm/marked@11.1.0/marked.min.js"
      integrity="sha384-+pBQSmYtEXC3hQ5VUaVCf29+iZoVJLtwOW9Wf/iFxETwDke401fmC3cesoWnEI3r"
      crossorigin="anonymous"></script>
    <style>
      /* Dive Kit editorial palette (matches divekit.app) */
      :root {
        --paper: #fbfaf7;
        --paper-raised: #ffffff;
        --paper-tint: #f3f1ec;
        --ink: #181a1c;
        --ink-secondary: #494d52;
        --ink-muted: #75797f;
        --rule: rgb(24 26 28 / 0.14);
        --rule-strong: rgb(24 26 28 / 0.45);
        --accent: #0369a1;
        --accent-strong: #075985;
        --accent-wash: rgb(3 105 161 / 0.06);
      }
      body {
        margin: 0;
        padding: 0;
        background-color: var(--paper);
        color: var(--ink);
      }
      .container {
        max-width: 1012px;
        margin: 0 auto;
        padding: 45px;
      }
      .markdown-body {
        box-sizing: border-box;
        min-width: 200px;
        max-width: 980px;
        margin: 0 auto;
        padding: 45px;
        background-color: var(--paper-raised);
        color: var(--ink);
        border-radius: 12px;
        border: 1px solid var(--rule);
        box-shadow: 0 1px 2px rgb(24 26 28 / 0.04), 0 8px 24px rgb(24 26 28 / 0.06);
      }
      @media (max-width: 767px) {
        .markdown-body {
          padding: 15px;
        }
        .container {
          padding: 16px;
        }
      }
      /* Dive Kit brand theme colors */
      .markdown-body a {
        color: var(--accent);
        text-decoration: none;
      }
      .markdown-body a:hover {
        color: var(--accent-strong);
        text-decoration: underline;
      }
      .markdown-body code {
        background-color: var(--paper-tint);
        padding: 2px 6px;
        border-radius: 6px;
        border: 1px solid var(--rule);
        color: var(--ink-secondary);
      }
      .markdown-body pre {
        background-color: var(--paper-tint);
        padding: 16px;
        border-radius: 10px;
        border: 1px solid var(--rule);
        overflow-x: auto;
      }
      .markdown-body pre code {
        background-color: transparent;
        padding: 0;
        border: none;
      }
      .markdown-body table {
        border-collapse: separate;
        border-spacing: 0;
        border: 1px solid var(--rule);
        border-radius: 10px;
        overflow: hidden;
      }
      .markdown-body table tr {
        background-color: var(--paper-raised);
      }
      .markdown-body table tr:nth-child(2n) {
        background-color: var(--paper);
      }
      .markdown-body table th,
      .markdown-body table td {
        border-right: 1px solid var(--rule);
        border-bottom: 1px solid var(--rule);
        padding: 12px 16px;
      }
      .markdown-body table th:last-child,
      .markdown-body table td:last-child {
        border-right: 0;
      }
      .markdown-body table tr:last-child td {
        border-bottom: 0;
      }
      .markdown-body table th {
        background-color: var(--paper-tint);
        font-weight: 600;
        border-bottom: 1px solid var(--rule-strong);
      }
      .markdown-body hr {
        background-color: var(--rule);
        height: 1px;
        border: 0;
      }
      .markdown-body blockquote {
        border-left: 3px solid var(--accent);
        color: var(--ink-secondary);
        padding-left: 16px;
        margin-left: 0;
        background-color: var(--accent-wash);
        padding: 12px 16px;
        border-radius: 8px;
      }
      .markdown-body h1,
      .markdown-body h2,
      .markdown-body h3,
      .markdown-body h4,
      .markdown-body h5,
      .markdown-body h6 {
        font-family: 'Source Serif 4', Georgia, 'Times New Roman', serif;
        color: var(--ink);
        font-weight: 600;
        border-bottom-color: var(--rule);
      }
      /* Loading screen */
      .loading {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
        font-size: 16px;
        color: var(--ink-secondary);
        background-color: var(--paper);
      }
      .loading-logo {
        width: 80px;
        height: 80px;
        margin-bottom: 20px;
        animation: pulse 2s ease-in-out infinite;
      }
      .spinner {
        border: 3px solid var(--paper-tint);
        border-top: 3px solid var(--accent);
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin-bottom: 15px;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.7;
          transform: scale(0.95);
        }
      }
    </style>
  </head>
  <body>
    <div id="loading" class="loading">
      <img src="/assets/divekit/logo-circle-light.png" alt="Project Dive Kit Logo" class="loading-logo" />
      <div class="spinner"></div>
      <span>Loading...</span>
    </div>
    <div id="content" class="container" style="display: none">
      <article class="markdown-body" id="markdown-content"></article>
    </div>

    <script>
      // Fetch and render README.md
      fetch('README.md')
        .then((response) => response.text())
        .then((markdown) => {
          // Configure marked for GitHub Flavored Markdown
          marked.setOptions({
            gfm: true,
            breaks: true,
            headerIds: true,
            mangle: false,
          });

          // Convert markdown to HTML
          const html = marked.parse(markdown);

          // Insert into page
          document.getElementById('markdown-content').innerHTML = html;

          // Hide loading, show content
          document.getElementById('loading').style.display = 'none';
          document.getElementById('content').style.display = 'block';

          // Update page title from first h1
          const firstH1 = document.querySelector('h1');
          if (firstH1) {
            document.title = firstH1.textContent + ' — Project Dive Kit';
          }
        })
        .catch((error) => {
          console.error('Error loading README:', error);
          document.getElementById('loading').innerHTML =
            '<div style="color: #b91c1c;">⚠️ Failed to load README.md</div>';
        });
    </script>
  </body>
</html>
